image: python:3.11

stages:
  - lint
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "$CI_PROJECT_DIR/backend"

cache:
  paths:
    - .cache/pip

before_script:
  - cd backend
  - pip install -r namo_core/requirements.txt
  - pip install pytest pytest-asyncio pytest-cov ruff

lint-job:
  stage: lint
  script:
    - ruff check namo_core

unit-test-job:
  stage: test
  script:
    - pytest namo_core/tests/ --cov=namo_core --cov-report=term

health-check-job:
  stage: test
  script:
    - cd ..
    - python scripts/health_check.py || echo "Health check requires local Redis/DB. Basic execution path completed."

deploy-job:
  stage: deploy
  script:
    - echo "Deploy stage is gated by successful lint and test stages."
